<div class="register">
  @if (showInvalidModal) {
    <div class="modal-overlay" (click)="closeInvalidModal()" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal" (click)="$event.stopPropagation()">
        <p id="modal-title" class="modal__message">Algunos campos son invalidos</p>
        <button type="button" class="modal__btn" (click)="closeInvalidModal()">Aceptar</button>
      </div>
    </div>
  }

  <div class="register__card">
    <img src="/icon-user.svg" alt="" class="register__icon" width="90" height="90" aria-hidden="true" />

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="register__form">
      <div class="field">
        <label for="nombre" class="field__label">Nombre</label>
        <div class="field__input-wrap">
          <input
            id="nombre"
            type="text"
            formControlName="nombre"
            class="field__input"
            placeholder=" "
            autocomplete="name"
          />
          <button type="button" class="field__clear" aria-label="Borrar" (click)="clearField('nombre')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="email" class="field__label">Email</label>
        <div class="field__input-wrap">
          <input
            id="email"
            type="email"
            formControlName="email"
            class="field__input"
            placeholder=" "
            autocomplete="email"
          />
          <button type="button" class="field__clear" aria-label="Borrar" (click)="clearField('email')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="password" class="field__label">Contraseña</label>
        <div class="field__input-wrap">
          <input
            id="password"
            type="password"
            formControlName="password"
            class="field__input"
            placeholder=" "
            autocomplete="new-password"
          />
          <button type="button" class="field__clear" aria-label="Borrar" (click)="clearField('password')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="confirmPassword" class="field__label">Confirmar Contraseña</label>
        <div class="field__input-wrap">
          <input
            id="confirmPassword"
            type="password"
            formControlName="confirmPassword"
            class="field__input"
            placeholder=" "
            autocomplete="new-password"
          />
          <button type="button" class="field__clear" aria-label="Borrar" (click)="clearField('confirmPassword')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn--outline">
        <span class="btn__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
            <path d="M12 2l2.4 7.4h7.6l-6 4.6 2.3 7-6.3-4.6L5.7 21 8 14l-6-4.6h7.6L12 2z"/>
          </svg>
        </span>
        Registrarse
      </button>
    </form>
  </div>
</div>
