<div class="login">
  <div class="login__card">
    <img src="/icon-user.svg" alt="" class="login__icon" width="90" height="90" aria-hidden="true" />

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login__form">
      <div class="field">
        <label for="email" class="field__label">Email</label>
        <div class="field__input-wrap">
          <input
            id="email"
            type="email"
            formControlName="email"
            class="field__input"
            placeholder=" "
            autocomplete="email"
          />
          <button type="button" class="field__clear" aria-label="Borrar" (click)="clearField('email')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="password" class="field__label">Contraseña</label>
        <div class="field__input-wrap">
          <input
            id="password"
            type="password"
            formControlName="password"
            class="field__input"
            placeholder=" "
            autocomplete="current-password"
          />
          <button type="button" class="field__clear" aria-label="Borrar" (click)="clearField('password')">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16" height="16" aria-hidden="true">
              <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn--primary">Iniciar Sesion</button>
    </form>
  </div>
</div>
